spring.application.name=AI question paper generator
spring.datasource.url=jdbc:mysql://localhost:${DB_PORT}/${DB_NAME}?autoReconnect=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.profiles.active=${SPRING_PROFILES_ACTIVE}
spring.servlet.multipart.max-file-size=${MULTIPART_FILE_SIZE_MAX}
spring.servlet.multipart.max-request-size=${MULTIPART_REQUEST_FILE_SIZE_MAX}
spring.jackson.deserialization.fail-on-unknown-properties=true

groq.api.url=https://api.groq.com/openai/v1/chat/completions
gemini.api.key=${GEMINI_API_KEY}
gemini.embedding.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-embedding-001:embedContent

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

front.end.url=${FRONT_END_URL}